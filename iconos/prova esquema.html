<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Layout</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .container {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 30px;
    padding: 40px;
  }

  .imatge-gran {
    background: #ddd;
    height: 400px;
    border: 3px solid black;
  }

  .menu-dreta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .submenu {
    background: #eee;
    border: 3px solid black;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
    }

    .menu-dreta {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="imatge-gran">
    <!-- Imatge -->
     <img src="/img/logo.jpg" alt="metodomus">
  </div>

  <div class="menu-dreta">
    <div class="submenu">Submenú 1</div>
    <div class="submenu">Submenú 2</div>
    <div class="submenu">Submenú 3</div>
    <div class="submenu">Submenú 4</div>
    <div class="submenu">Submenú 5</div>
    <div class="submenu">Submenú 6</div>
  </div>
</div>

</body>
</html>
