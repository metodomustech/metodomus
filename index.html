<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metodomus</title>
    <link rel="stylesheet" href="css/estils.css">
</head>

<body>

<header>
    <nav class="menu container">
        
        <div class="logo">
            <a href="#" onclick="carregarPagina('home')">
                <img src="img/logo_trnsp.png" alt="LOGO">
            </a>
        </div>

        <div class="hamburguesa" id="hamburguesa">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="menu-derecha" id="menu">
            <li><a href="#" onclick="carregarPagina('ajuts')">ajuts tècnics</a></li>
            <li><a href="#" onclick="carregarPagina('formacio')">formació a professionals</a></li>
            <li><a href="#" onclick="carregarPagina('domotica')">domòtica</a></li>
            <li><a href="#" onclick="carregarPagina('servei')">servei tècnic</a></li>
            <li><a href="#" onclick="carregarPagina('metodologia')">metodologia</a></li>
        </ul>

    </nav>
</header>

<!-- 🔥 HERO (FONS PRINCIPAL) -->
<section class="hero">
    <div class="hero-content">
        <h1>Autonomia a través de la tecnologia</h1>
        <p>Solucions en domòtica i ajuts tècnics</p>
    </div>
</section>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>


<!-- CONTINGUT DINÀMIC -->
<main id="contingut" class="contingut">
    
    <!-- Aquí es carregaran les pàgines -->
</main>

<!-- JS -->
<script>
const hamburguesa = document.getElementById('hamburguesa');
const menu = document.getElementById('menu');
const overlay = document.getElementById('overlay');

function toggleMenu() {
    hamburguesa.classList.toggle('actiu');
    menu.classList.toggle('actiu');
    overlay.classList.toggle('actiu');
}

hamburguesa.addEventListener('click', toggleMenu);
overlay.addEventListener('click', toggleMenu);

// 🔥 FUNCIÓ PER CARREGAR PÀGINES
function carregarPagina(pagina) {

    let ruta = "";

    const hero = document.querySelector('.hero');

    if (pagina === "home") {
        hero.style.display = "flex";
    } else {
        hero.style.display = "none";
    }

    

    switch(pagina) {
        case "home":
            ruta = "pages/home.html";
            break;
        case "ajuts":
            ruta = "pages/ajuts.html";
            break;
        case "formacio":
            ruta = "pages/formacio.html";
            break;
        case "domotica":
            ruta = "pages/domotica.html";
            break;
        case "servei":
            ruta = "pages/servei.html";
            break;
        case "metodologia":
            ruta = "pages/metodologia.html";
            break;
    }


    fetch(ruta)
        .then(res => res.text())
        .then(data => {
            document.getElementById("contingut").innerHTML = data;
        });

    // Tancar menú mòbil
    hamburguesa.classList.remove('actiu');
    menu.classList.remove('actiu');
    overlay.classList.remove('actiu');
}

// 🔥 Carregar pàgina inicial
carregarPagina('home');
</script>

</body>
</html>
