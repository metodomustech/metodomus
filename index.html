  body {
    background-image: url('img/fons.png');
    background-size: cover; /* Ajusta la imagen para cubrir toda la pantalla */
    background-repeat: no-repeat; /* Evita que la imagen se repita */
    background-position: center; /* Centra la imagen */
    background-attachment: fixed; /* Mantiene la imagen fija al hacer scroll */
    margin: 0; /* Elimina márgenes predeterminados */
    height: 100vh; /* Asegura que cubra el alto de la ventana */
  }







.container {
  display: flex;
  min-height: 100vh;
  padding: 40px;
  box-sizing: border-box;
}

/* ESQUERRA */
.left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.logo {
  width: 180px;
  margin-bottom: 30px;
}

.title {
  color: white;
  font-size: 60px;
  font-weight: bold;

  
  line-height: 1.1;
}

/* DRETA */
.right {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  align-content: center;
}

/* BOTONS*/



.card {
  position: relative;
  /* background: #e7b8bf; */
  /*background: #e7b8bf;*/
  color: white;
  padding: 25px 20px;
  border-radius: 40px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  overflow: visible;
}

.card:hover {
  transform: scale(1.05);
}

.icon {
  position: absolute;
  top: -25px;
  left: -25px;
  width: 60px;
  height: 60px;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
    text-align: center;

  .left {
    margin-bottom: 40px;
  }

   .title {
    font-size: 40px;
  }
 
  .right {
    grid-template-columns: 1fr;
  }




/* Estilos de la barra superior fija */
.header {
    background-color: #333; /* Color de fondo */
    position: fixed; /* Fija el menú arriba */
    top: 0;
    width: 100%;
    z-index: 1000; /* Asegura que esté por encima de otros elementos */
}

.navbar {
    display: flex;
    justify-content: space-between; /* Logo a la izq, links a la der */
    align-items: center;
    padding: 1rem 2rem;
}

.logo {
    color: white;
    font-size: 1.5rem;
    text-decoration: none;
    font-weight: bold;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 20px; /* Espacio entre opciones */
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 1rem;
    transition: color 0.3s;
}

/* Efecto al pasar el cursor */
.nav-links a:hover {
    color: #f4a261;
}
}

.navbar {
    background-color: #333; /* Color de fondo */
    padding: 10px 20px;
}

/* Estilos de la lista - ¡Aquí está la magia! */
.menu-derecha {
    display: flex;
    justify-content: flex-end; /* Alinea los elementos a la derecha */
    list-style-type: none; /* Quita los puntos de la lista */
    margin: 0;
    padding: 0;
}

/* Estilos de los elementos de lista */
.menu-derecha li {
    margin-left: 20px; /* Espacio entre opciones */
}

/* Estilos de los enlaces */
.menu-derecha a {
    text-decoration: none; /* Quita subrayado */
    color: white; /* Color texto */
    font-weight: bold;
    padding: 5px 10px;
}

/* Efecto al pasar el ratón */
.menu-derecha a:hover {
    color: #f4a261;
}

  .logo {
    float: left;
    margin-top: 10px;  /* Margen superior */
    margin-left: 20px; /* Margen izquierdo */
    width: 200px;
  }
