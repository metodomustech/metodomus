<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Metodomus</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #5b8fd9;
  color: white;
}

.container {
  display: flex;
  min-height: 100vh;
  padding: 40px;
  box-sizing: border-box;
}

/* ESQUERRA */
.left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.logo {
  width: 180px;
  margin-bottom: 30px;
}

.title {
  font-size: 60px;
  font-weight: bold;
  line-height: 1.1;
}

/* DRETA */
.right {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  align-content: center;
}

/* BOTONS*/



.card {
  position: relative;
  background: #e7b8bf;
  color: black;
  padding: 25px 20px;
  border-radius: 40px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  overflow: visible;
}

.card:hover {
  transform: scale(1.05);
}

.icon {
  position: absolute;
  top: -25px;
  left: -25px;
  width: 60px;
  height: 60px;
}

.card {
  background: #e7b8bf;

  transition: 0.3s;

.card:hover {

}*/

/* RESPONSIVE */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
    text-align: center;
  }

  .left {
    margin-bottom: 40px;
  }

  .title {
    font-size: 40px;
  }

  .right {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- ESQUERRA -->
  <div class="left">
    
    <div class="title, center">
      <h1> BENVINGUTS A</h1>
    <br>
    <br>
      <img src="img/logo_trnsp.png" class="logo" alt="logo">
    </div>
  </div>


<!-- DRETA-->

<div class="right">
  
  <div class="card">
    <img src="img/nav/ajutstecnics.png" class="icon">
    AJUTS TÈCNICS
  </div>

  <div class="card">
    <img src="img/nav/domotica.png" class="icon">
    DOMÒTICA
  </div>

  <div class="card">
    <img src="img/nav/formacioprofesionals.png" class="icon">
    FORMACIÓ A PROFESSIONALS
  </div>

  <div class="card">
    <img src="img/nav/serveitecnic.png" class="icon">
    SERVEI TÈCNIC
  </div>

  <div class="card">
    <img src="img/nav/formaciodomicili.png" class="icon">
    FORMACIÓ A DOMICILIS
  </div>

  <div class="card">
    <img src="img/nav/metodologia.png" class="icon">
    METODOLOGIA
  </div>

</div>

</body>
